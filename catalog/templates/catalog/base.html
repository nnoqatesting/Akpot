{% load static %}
<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Amortiguadores para Capot | Repuestos originales y premium{% endblock %}</title>
  <meta name="description" content="Amortiguadores a gas para capot de auto. Encontrá el repuesto exacto para tu Volkswagen, Chevrolet, Fiat, Renault o Peugeot. Instalación y envíos a todo el país.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'catalog/css/style.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}

  <script src="{% static 'catalog/js/main.js' %}" defer></script>
  {% block extra_js %}{% endblock %}

</html>
